# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - pa4-27100293

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: pa427100293.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2DF671A93C0F41428D73D03BC3B3C73F }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_D03CD4B4508345F9AD8B0B034E7EDC7A }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: pa427100293.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2DF671A93C0F41428D73D03BC3B3C73F }}/func-app:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_47A38B9543CE4766B53FACC1D3BD9933 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BE6F7B51BBDC43C18AEC732DC411AB1B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_125504D9A93042DFB44B9D34351C48CC }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'pa4-27100293'
          slot-name: 'Production'
          images: 'pa427100293.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_2DF671A93C0F41428D73D03BC3B3C73F }}/func-app:${{ github.sha }}'
          